<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Login Criffer - Gestão de Resultados</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Outfit', sans-serif; overflow: hidden; background: #000; }
        .container { display: flex; width: 100vw; height: 100vh; position: relative; }
        .left-side { flex: 1; background: url('file:///C:/Users/douglas.bitencourt/.gemini/antigravity/brain/9541ac38-182d-439b-8217-e25509d8306a/mockup_login_golden_criffer_final_1776427013734.png') no-repeat center center; background-size: cover; filter: brightness(0.85) contrast(1.1) saturate(0.9); }
        .right-side { flex: 1; background: url('file:///C:/Users/douglas.bitencourt/.gemini/antigravity/brain/9541ac38-182d-439b-8217-e25509d8306a/mockup_login_unified_hybrid_1_1776426444033.png') no-repeat center center; background-size: cover; }
        .login-card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 420px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(40px); border-radius: 32px; padding: 48px; box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.4); text-align: center; border: 1px solid rgba(255,255,255,0.5); }
        .logo-circle { width: 90px; height: 90px; background: white; border-radius: 50%; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .logo-circle img { width: 75%; height: 75%; object-fit: contain; }
        .brand-boxes { display: flex; justify-content: center; gap: 5px; margin-bottom: 8px; }
        .box { width: 34px; height: 34px; background: #FF6A22; color: white; display: flex; align-items: center; justify-content: center; font-weight: 900; border-radius: 5px; font-size: 20px; }
        .subtitle { font-size: 11px; font-weight: 900; color: #FF6A22; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
        .input-group { text-align: left; margin-bottom: 24px; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; color: #9CA3AF; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1.5px; }
        .input-group select, .input-group input { width: 100%; padding: 16px; border-radius: 14px; border: 1.5px solid #F3F4F6; background: #F9FAFB; font-size: 15px; outline: none; transition: 0.2s; font-family: inherit; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 18px; background: #FF6A22; color: white; border: none; border-radius: 14px; font-weight: 900; font-size: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 15px 35px rgba(255, 106, 34, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-side"></div>
        <div class="right-side"></div>
        <div class="login-card">
            <div class="logo-circle"><img src="https://www.criffer.com.br/wp-content/themes/criffer/assets/images/logo-criffer.png" alt="Logo"></div>
            <div class="brand-boxes"><div class="box">C</div><div class="box">R</div><div class="box">I</div><div class="box">F</div><div class="box">F</div><div class="box">E</div><div class="box">R</div></div>
            <div class="subtitle">GESTÃO DE RESULTADOS</div>
            <div class="input-group">
                <label>Acesso Administrativo</label>
                <select>
                    <option value="">Selecione seu nome</option>
                    <option>Douglas Bitencourt (Master)</option>
                    <option>Juliano Chagas (Master)</option>
                    <option>Faiblan (Master)</option>
                    <option>Andressa Barth - Gestor Produção</option>
                    <option>Rodrigo Santos - Gestor Compras</option>
                    <option>Carlos Rocha - Gestor Laboratório de Manutenção</option>
                    <option>Cleiton Staehler - Gestor Manutenção</option>
                    <option>Douglas Schmitz - Gestor Logística</option>
                    <option>Felipe Oliveira - Gestor Marketing</option>
                    <option>Felipe Charão - Gestor TI</option>
                    <option>Fernando Malta - Gestor P&D</option>
                    <option>Felipe Immich - Gestor Laboratório Calibração</option>
                    <option>Gabriel Dias - Gestor Vendas</option>
                    <option>Ruslan Santos - Gestor Suporte Técnico</option>
                </select>
            </div>
            <div class="input-group"><label>Senha de Segurança</label><input type="password" placeholder="••••••••"></div>
            <button class="btn-login">ACESSAR RESULTADOS</button>
        </div>
    </div>
</body>
</html>
